name: Update magazine feeds

on:
  schedule:
    # Every 6 hours
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-feeds
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feeds
        env:
          # Optional: set repo variable BASE_FEED_URL for Atom <link rel="self">
          # e.g. https://raw.githubusercontent.com/monk-blade/gs-magazine-rss/master/feeds
          BASE_FEED_URL: ${{ vars.BASE_FEED_URL }}
        run: |
          EXTRA=()
          if [ -n "${BASE_FEED_URL}" ]; then
            EXTRA+=(--base-feed-url "${BASE_FEED_URL}")
          fi
          python generate_feeds.py \
            --max-articles 50 \
            --pages 5 \
            --drishti-days 30 \
            --drishti-editorials 50 \
            --delay 0.7 \
            --out feeds \
            "${EXTRA[@]}"

          for f in \
            feeds/business-standard-opinion.xml \
            feeds/indian-express-explained.xml \
            feeds/ravi-purti.xml \
            feeds/shatdal.xml \
            feeds/editorial.xml \
            feeds/drishti-current-affairs.xml \
            feeds/drishti-editorials.xml \
            feeds/drishti-prelims-facts.xml
          do
            test -s "$f"
            grep -q '<entry>' "$f"
          done

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            feeds/business-standard-opinion.xml \
            feeds/indian-express-explained.xml \
            feeds/ravi-purti.xml \
            feeds/shatdal.xml \
            feeds/editorial.xml \
            feeds/drishti-current-affairs.xml \
            feeds/drishti-editorials.xml \
            feeds/drishti-prelims-facts.xml
          if git diff --staged --quiet; then
            echo "No feed changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh generated feeds"
          git push
